<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
    
    <!-- Gold Coin Gradient -->
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Lightning Bolt Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Rectangle (Squircle) -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Glow / Ring -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="none" stroke="#ede9fe" stroke-width="6" stroke-opacity="0.15" />

  <!-- Coin/Money Element -->
  <circle cx="210" cy="280" r="100" fill="url(#coinGrad)" />
  <circle cx="210" cy="280" r="85" fill="none" stroke="#fff" stroke-width="4" stroke-opacity="0.3" />
  
  <!-- Dollar Symbol inside Coin -->
  <text x="210" y="315" font-family="'Inter', system-ui, sans-serif" font-size="110" font-weight="900" fill="#ffffff" text-anchor="middle" opacity="0.95">$</text>

  <!-- Fast/Speed Lightning Bolt (Foreground) -->
  <path d="M350 80 L220 270 L300 270 L190 440 L380 210 L300 210 Z" fill="#ffffff" filter="url(#glow)" />
</svg>
